
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#3CFFB0">
<link rel="manifest" href="manifest.json">
<title>Cyber Circle</title>
<script src="https://download.agora.io/sdk/release/AgoraRTC_N.js"></script>
<style>
  :root{--bg:#070B0C; --surface:#0E1516; --border:#1C2B2C; --text:#DCEFE9; --textDim:#5E7876; --accent:#3CFFB0; --accent2:#22D3EE; --danger:#FF5C7A;}
  *{box-sizing:border-box; font-family:system-ui;}
  body{margin:0;background:var(--bg);color:var(--text);}
 .phone{max-width:420px;height:100vh;margin:0 auto;display:flex;flex-direction:column;background:var(--bg);}
 .topbar{padding:12px; border-bottom:1px solid var(--border); font-weight:bold; font-mono;}
 .messages{flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px;}
 .msg{max-width:75%; padding:8px 12px; border-radius:12px; font-size:14px;}
 .me{align-self:flex-end; background:var(--accent); color:#04120D;}
 .them{align-self:flex-start; background:var(--surface);}
 .msg img,.msg video,.msg audio{max-width:200px; border-radius:8px; margin-top:4px; display:block;}
 .inputBar{display:flex; gap:8px; padding:12px; border-top:1px solid var(--border);}
  input{flex:1; background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:20px;padding:10px 14px; outline:none;}
  button{border:none; cursor:pointer;}
 .iconBtn{width:40px; height:40px; border-radius:50%; background:var(--surface); border:1px solid var(--border); color:var(--textDim); font-size:18px;}
 .sendBtn{background:var(--accent); color:#04120D; border-radius:50%;}
 .actionBar{display:flex; gap:12px; padding:8px 12px; border-top:1px solid var(--border); justify-content:center;}
  #callScreen{position:fixed; inset:0; background:#000; z-index:99; display:flex; flex-direction:column;}
  #remoteVideo{flex:1; background:#111;}
  #localVideo{position:absolute; bottom:80px; right:16px; width:100px; height:130px; background:#222; border:2px solid white; border-radius:8px;}
  #leaveBtn{position:absolute; bottom:20px; left:50%; transform:translateX(-50%); width:60px; height:60px; border-radius:50%; background:var(--danger); border:none; color:white; font-size:24px;}
 .hidden{display:none!important;}
</style>
</head>
<body>
<div class="phone">
  <div id="chatScreen">
    <div class="topbar">Cyber Circle DM</div>
    <div id="dmMessages" class="messages"></div>
    <div class="actionBar">
      <label class="iconBtn" style="display:flex;align-items:center;justify-content:center;">🖼️ <input type="file" id="mediaInput" accept="image/*,video/*" style="display:none" /></label>
      <button class="iconBtn" onclick="startCall(false)">📞</button>
      <button class="iconBtn" onclick="startCall(true)">📹</button>
    </div>
    <div class="inputBar">
      <input id="dmInput" placeholder="Message..." />
      <button id="micBtn" class="iconBtn">🎤</button>
      <button onclick="sendDM()" class="iconBtn sendBtn">➤</button>
    </div>
  </div>
  <div id="callScreen" class="hidden">
    <div id="remoteVideo"></div>
    <div id="localVideo"></div>
    <button id="leaveBtn" onclick="leaveCall()">X</button>
  </div>
</div>

<script>
const AGORA_APP_ID = "a9752a94b98b4d7db1c402d18e8099e8"; // ✅ TUMHARI ID
let client, localTracks;
let mediaRecorder;
let audioChunks = [];
let isRecording = false;
const conversations = [{id: "ayesha_root", messages: [{from:"them", type:"text", text:"Salam! Call karke test karo"}]}];

function renderChat(){
  const box=document.getElementById('dmMessages');
  box.innerHTML='';
  conversations[0].messages.forEach(m=>{
    let content='';
    if(m.type==='text')content=m.text;
    if(m.type==='image')content=`<img src="${m.url}">`;
    if(m.type==='video')content=`<video src="${m.url}" controls></video>`;
    if(m.type==='audio')content=`<audio src="${m.url}" controls></audio>`;
    box.innerHTML+=`<div class="msg ${m.from}">${content}</div>`
  });
  box.scrollTop=box.scrollHeight;
}
renderChat();

document.getElementById('mediaInput').onchange = (e)=>{
  const file=e.target.files[0];
  if(!file) return;
  const url=URL.createObjectURL(file);
  addMessage('me',file.type.startsWith('video')?'video':'image',url);
}
document.getElementById('micBtn').onmousedown = startRec;
document.getElementById('micBtn').onmouseup = stopRec;
document.getElementById('micBtn').ontouchstart = startRec;
document.getElementById('micBtn').ontouchend = stopRec;

async function startRec(){
  if(isRecording) return;
  isRecording = true;
  document.getElementById('micBtn').style.background = 'var(--danger)';
  const stream=await navigator.mediaDevices.getUserMedia({audio:true});
  mediaRecorder=new MediaRecorder(stream);
  mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
  mediaRecorder.onstop=()=>{
    addMessage('me','audio',URL.createObjectURL(new Blob(audioChunks)));
    audioChunks=[];
    stream.getTracks().forEach(t=>t.stop());
  };
  mediaRecorder.start();
}
function stopRec(){
  if(!isRecording) return;
  isRecording = false;
  document.getElementById('micBtn').style.background = 'var(--surface)';
  mediaRecorder.stop();
}
function sendDM(){
  const val=document.getElementById('dmInput').value;
  if(!val.trim()) return;
  addMessage('me','text',val);
  document.getElementById('dmInput').value='';
}
function addMessage(from,type,content){
  conversations[0].messages.push({from,type,url:content, text: type==='text'?content:''});
  renderChat();
}

// AGORA CALL CODE
async function startCall(isVideo){
  document.getElementById('callScreen').classList.remove('hidden');
  client = AgoraRTC.createClient({ mode: "rtc", codec: "vp8" });
  await client.join(AGORA_APP_ID, "cyber-room-1", null, null);
  localTracks = isVideo? await AgoraRTC.createMicrophoneAndCameraTracks() : [await AgoraRTC.createMicrophoneAudioTrack()];
  if(isVideo) localTracks[1].play("localVideo");
  else localTracks[0].play();
  await client.publish(localTracks);
  client.on("user-published", async (user, mediaType) => {
    await client.subscribe(user, mediaType);
    if(mediaType==='video') user.videoTrack.play("remoteVideo");
    if(mediaType==='audio') user.audioTrack.play();
  });
}
async function leaveCall(){
  localTracks.forEach(t=>t.close());
  await client.leave();
  document.getElementById('callScreen').classList.add('hidden');
}
</script>
</body>
</html>
